    <h1> Receta Huevos revueltos con tocino</h1>
<figure>
 <img src="https://imagenes.multimediostv.com/files/main_image/uploads/2020/07/29/64f2d2da72962.jpeg" alt="imagen huevo con tocino"

     <h2>Descripcion</h2>
   <p>en esta pagina  aprenderemos a preparar huevos revueltos con tocino, una receta que me gusta mucho</p>
    <h2>Ingredientes</h2>
    <ul>
    <li>3 Huevos</li>
    <li>30g de  tocino</li>
    <li>Aceite</li>
    <li>Sal</li>
    </ul>
    <h2>Pasos a seguir</h2>
    <ol>Ponemos aceite en una sarten</ol>
    <ol>echamos el tocino cortado en cuadritos o en trozoz completos al sarten a gusto del consumidor</ol>
    <ol>cuando el tocino este doriadito agregamos los 3 huevos al sarten y revolvemos por 3 minutos hasta que el huevo quede
        cocido a gusto del consumidor hay quienes lo prefieren mas humedo o mas cocido
    </ol>
    <ol> ponemos sal  a gusto y a comer se puede acompañar con pan tostado, tortillas o simplemente comerlo solo</ol>
