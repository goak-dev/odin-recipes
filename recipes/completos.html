     <h2>Descripcion</h2>

     <p>En esta pagina aprenderemos a preparar unos clasicos completos 
        italianos al estilo chileno, se comen hot dogs en todo el mundo
        pero cada lugar tiene su estilo propio. Aqui veremos la receta del 
        mas popular de chile.
     </p>

     <h2>Ingredientes</h2>

     <ul> 
        <li>Pan de hot dog</li>
        <li>salchichas</li>
        <li>palta</li>
        <li>tomate</li>
        <li>mayonesa</li>
     </ul>

     <h2>Pasos a seguir</h2>

    <ol>
        <li>ponemos a cocinar las salchichas en agua hirviendo hasta que esten cocidas</li>
        <li>molemos la palta para que quede cremosa y facil de untar</li>
        <li>cortamos el tomate en cuadraditos</li>
        <li>tostamos el pan</li>
        <li>ahora toca armar el completo</li>
        <li>colocamos la salchicha dentro del pan</li>
        <li>ponemos el tomate en cuadritos sobre la salchicha</li>
        <li>ponemos la palta encima del tomate para que el tomate no se caiga facil</li>
        <li>agregamos la mayonesa</li>
        <li>a disfrutar!</li>
        <h3>notas</h3>

        <p>se recomienda agregar salsas a gusto personal como ketchup o mostaza</p>
        <p>si no le gusta algun ingrediente es libre de sacarlo y perzonalizar su completo</p>





    </ol>
